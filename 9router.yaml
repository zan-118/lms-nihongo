# 9router Configuration for NihongoRoute
# Jalankan dengan: 9router --config 9router.yaml

port: 20128
host: 0.0.0.0

# Auth untuk aplikasi kita mengakses 9router
auth_tokens:
  - sk-aa3015220f09d323-nxrog1-f6718d74

# Provider & API Keys
providers:
  google:
    api_key: "${GEMINI_API_KEY}" # Mengambil dari environment variable

# Pemetaan model alias ke model asli
models:
  ag/gemini-3-flash:
    provider: google
    name: gemini-2.0-flash # Model asli yang digunakan
    parameters:
      temperature: 0.2
      max_tokens: 8192

# Logging untuk memantau trafik
logging:
  level: info
  format: text
